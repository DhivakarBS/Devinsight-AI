version: '3.8'
services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: devinsight
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - '5432:5432'

  backend:
    build: .
    restart: on-failure
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/devinsight
      - JWT_SECRET_KEY=changeme
      - GITHUB_TOKEN=
      - GEMINI_API_KEY=
    ports:
      - '8000:8000'

volumes:
  db-data:
